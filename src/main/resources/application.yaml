spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: http://order-service:8081
              predicates:
                - Path=/api/v1/orders/**

            - id: inventory-service
              uri: http://inventory-service:8082
              predicates:
                - Path=/api/v1/products/**

            - id: payment-service
              uri: http://payment-service:8083
              predicates:
                - Path=/api/v1/payments/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  prometheus:
    metrics:
      export:
        enabled: true