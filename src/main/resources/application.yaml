spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/orders/**

            - id: inventory-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/products/**

            - id: payment-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/payments/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway